services:
  - type: web
    name: whatsa-king
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: whatsa-king-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: whatsa-king-db
    plan: free
