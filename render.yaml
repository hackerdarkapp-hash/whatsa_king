services:
  - type: web
    name: whatsa-king
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: whatsa-king-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: whatsa-king-db
    plan: free
